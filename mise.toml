[tools]
"github:caarlos0/svu" = "latest"
"github:CycloneDX/cyclonedx-gomod" = "latest"
go = "latest"
python = "3.14"
golangci-lint = "latest"
golangci-lint-langserver = "latest"
goreleaser = "latest"
nfpm = "latest"
"pipx:build" = "latest"
"pipx:hatchling" = "latest"
ruff = "latest"
typos = "latest"
hk = { version = "1.43.0", os = ["linux", "macos/arm64", "windows"] }
pkl = "latest"

[env]
HK_JOBS = "1"

[tasks.format]
description = "Format all Go code"
run = "gofmt -w boxer/ box/"

[tasks.build]
description = "Build release artifacts locally with goreleaser"
run = "goreleaser release --snapshot --clean --skip publish"

[tasks."generate:boxer"]
description = "Run go generate on boxer folder"
run = "go generate"
dir = "{{cwd}}/boxer"

[tasks."generate:box"]
description = "Run go generate on boxer folder"
run = "go generate"
dir = "{{cwd}}/box"

[tasks."fmt-check:boxer"]
description = "Check Go formatting in boxer/"
run = "gofmt -l ."
dir = "{{cwd}}/boxer"
depends = ["generate:boxer"]

[tasks."fmt-check:box"]
description = "Check Go formatting in box/"
run = "gofmt -l ."
dir = "{{cwd}}/box"
depends = ["generate:box"]

[tasks."lint:boxer"]
description = "Run golangci-lint in boxer/"
run = "golangci-lint run"
dir = "{{cwd}}/boxer"
depends = ["generate:boxer"]

[tasks."lint:box"]
description = "Run golangci-lint in box/"
run = "golangci-lint run"
dir = "{{cwd}}/box"
depends = ["generate:box"]

[tasks."test:boxer"]
description = "Run tests in boxer/"
run = "go test -v ./..."
dir = "{{cwd}}/boxer"
depends = ["generate:boxer"]

[tasks."test:box"]
description = "Run tests in box/"
run = "go test -v ./..."
dir = "{{cwd}}/box"
depends = ["generate:box"]

[tasks."ci:boxer"]
description = "Run all CI checks for boxer"
depends = ["fmt-check:boxer", "lint:boxer", "test:boxer"]

[tasks."ci:box"]
description = "Run all CI checks for box"
depends = ["fmt-check:box", "lint:box", "test:box"]

[tasks.lint]
description = "Run linters with hk"
run = "hk check --all"
depends = ["generate:*"]

[tasks.ci]
description = "Run all CI checks"
run = [
  { task = "ci:boxer" },
  { task = "ci:box" },
]
depends = ["generate:*"]

[tasks."e2e:pypi"]
description = "Run end-to-end tests for the pypi install path (full cross-compile matrix)"
run = "python scripts/e2e.py pypi"

[tasks."e2e:wheel"]
description = "Run end-to-end tests for the wheel install path (native target only)"
run = "python scripts/e2e.py wheel"

[tasks.e2e]
description = "Run all end-to-end tests (pypi + wheel)"
run = "python scripts/e2e.py all"

[settings]
jobs = 1
