project_name: uvbox
version: 2
report_sizes: true

before:
  hooks:
    # Ensure the embedded box repository archive is generated before building
    - bash -lc "cd boxer && go generate ./..."

builds:
  - id: uvbox
    dir: ./boxer
    main: .
    binary: uvbox
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    hooks:
      post:
        - cmd: python3 pypi/uvbox/build_wheels.py "{{ .Os }}" "{{ .Arch }}" "{{ .Version }}" "{{ .Path }}" --binary-name "{{ .Name }}"
          output: true

archives:
  - id: default
    ids:
      - uvbox
    name_template: "{{ .Binary }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: zip

checksum:
  name_template: "checksums.txt"

nfpms:
  - id: uvbox
    package_name: uvbox
    ids:
      - uvbox
    formats: [apk, archlinux, deb, ipk, rpm]
    vendor: "Amadeus s.a.s."
    maintainer: "Jean-Philippe CARLENS <jean-philippe.carlens@amadeus.com>"
    homepage: "https://github.com/AmadeusITGroup/uvbox"
    description: |
      uvbox generates standalone Python executables that bootstrap an embedded
      uv to install and run your app in an isolated environment. For any platform, from any platform.
    license: MIT
    provides:
      - uvbox
    priority: extra
    section: utils

release:
  # Use GitHub Releases (default)
  draft: false
  prerelease: auto

changelog:
  use: github
  sort: desc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
