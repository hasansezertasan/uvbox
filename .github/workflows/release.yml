name: Release & Publish

# This workflow handles the complete release process:
# 1. Computes and pushes version tag with automatic cleanup on failure
# 2. Builds Go binaries with GoReleaser
# 3. Signs and publishes Python wheels to PyPI or Test PyPI (user choice)
# All steps run in a single job with automatic tag/release cleanup on any failure

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump"
        type: choice
        options:
          - patch
          - minor
          - major
      publish_to_pypi:
        description: "Publish to producton PyPI. By default, it only releases to test PyPI."
        type: boolean
        default: true

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.compute-tag.outputs.tag }}
    permissions:
      contents: write # Required for creating releases and tags
    steps:
      # Clone
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0  # Required for tag computation and goreleaser changelog

      # Python is needed for GoReleaser post-build hooks that create Python wheels
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      # Dependencies used for wheel builds
      - name: Install Python build tools
        run: pip install hatchling build

      # Go compiler
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: boxer/go.mod

      # Used to bump version
      - name: Install svu
        run: go install github.com/caarlos0/svu/v3@latest

      # Compute tag, create it, and push to remote
      - id: compute-tag
        name: Compute and push tag
        env:
          BUMP: ${{ github.event.inputs.bump }}
        run: |
          TAG="$(svu "$BUMP")"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "TAG=$TAG" >> "$GITHUB_ENV"
          git tag "$TAG"
          git push --tags

      # GoReleaser builds binaries, creates GitHub release, and runs post-build hooks
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Upload wheels as artifacts for publishing jobs
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels
          path: wheels/*.whl
          retention-days: 7

      # Cleanup tag and release if the workflow failed or was cancelled
      - name: Cleanup on failure
        if: failure() || cancelled()
        env:
          TAG: ${{ steps.compute-tag.outputs.tag }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Job failed or cancelled, cleaning up tag and release: $TAG"

          # Delete GitHub release if it was created
          gh release delete "$TAG" -y 2>/dev/null || true

          # Delete git tag locally and remotely
          git tag -d "$TAG" 2>/dev/null
          git push --delete origin "$TAG" 2>/dev/null

  publish-testpypi:
    name: Publish to Test PyPI
    needs: release
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/uvbox
    permissions:
      id-token: write
    steps:
      - name: Download wheels
        uses: actions/download-artifact@v4
        with:
          name: wheels
          path: wheels/

      - name: Publish to Test PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: wheels/
          skip-existing: true
          attestations: true

  publish-pypi:
    name: Publish to PyPI
    needs: publish-testpypi
    if: github.event.inputs.publish_to_pypi == 'true'
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/uvbox
    permissions:
      id-token: write
    steps:
      - name: Download wheels
        uses: actions/download-artifact@v4
        with:
          name: wheels
          path: wheels/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: wheels/
          skip-existing: true
          attestations: true

