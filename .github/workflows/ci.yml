name: Continuous Integration

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    name: Format, Lint, Test (${{ matrix.os }} / ${{ matrix.arch }})
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu
            arch: amd64
            runs_on: ubuntu-latest
          - os: ubuntu
            arch: arm64
            runs_on: ubuntu-24.04-arm
          - os: windows
            arch: amd64
            runs_on: windows-latest
          - os: windows
            arch: arm64
            runs_on: windows-11-arm
          - os: macos
            arch: amd64
            runs_on: macos-15-intel
          - os: macos
            arch: arm64
            runs_on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup mise
        uses: jdx/mise-action@v3

      - name: Run CI
        run: mise run ci

  e2e:
    name: End-to-end (${{ matrix.os }} / ${{ matrix.arch }})
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu
            arch: amd64
            runs_on: ubuntu-latest
          - os: ubuntu
            arch: arm64
            runs_on: ubuntu-24.04-arm
          - os: windows
            arch: amd64
            runs_on: windows-latest
          - os: windows
            arch: arm64
            runs_on: windows-11-arm
          - os: macos
            arch: amd64
            runs_on: macos-15-intel
          - os: macos
            arch: arm64
            runs_on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup mise
        uses: jdx/mise-action@v3

      - name: Run end-to-end tests
        run: mise run e2e
